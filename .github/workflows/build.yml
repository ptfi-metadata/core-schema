name: Build and deploy site

# On every push to main: regenerate terms.js + palette.css from the CSV sources
# and deploy the whole site to GitHub Pages. Nothing is committed back to the
# repo - the generated files exist only in the published site.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least-privilege: read the repo, publish to Pages. No write access to contents.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; don't pile up overlapping ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate terms.js + palette.css from data/
        run: python build/build.py

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
